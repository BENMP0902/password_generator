name: Run Test

on: [push, pull_request]

permissions:
    contents: read
    packages: write

jobs:
    test:
        runs-on: [ubuntu-latest]

        steps:
            - name: Chekout coode
              uses: actions/checkout@v4
            - name: Set up Python
              uses: actions/setup-python@v4
              with:
                  python-version: 3.13.7
            - name: Install dependencies
              run: pip install -r requirements-dev.txt
            - name: Check linting
              run: flake8 .
            - name: Run test
              run: pytest
            
             


